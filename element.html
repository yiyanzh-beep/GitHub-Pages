<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>元素周期表 | Periodic Table</title>
  <style>
    :root{
      --bg:#0b0f14;
      --text:#e5e7eb;
      --muted:#9ca3af;
      --border:rgba(255,255,255,.10);
      --shadow: 0 10px 30px rgba(0,0,0,.45);
      --radius:14px;
      --cellMin: 48px;
      --gap: 6px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
    }

    html, body { height: 100%; }
    body{
      margin:0;
      font-family:var(--sans);
      background: radial-gradient(1200px 800px at 20% 0%, rgba(59,130,246,.25), transparent 60%),
                  radial-gradient(900px 600px at 80% 10%, rgba(168,85,247,.20), transparent 55%),
                  var(--bg);
      color:var(--text);
    }

    .wrap{
      max-width: 1200px;
      margin: 18px auto 40px;
      padding: 0 14px;
    }

    header{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .title{ display:flex; flex-direction:column; gap:6px; }
    h1{ font-size:20px; margin:0; letter-spacing:.2px; font-weight:750; }
    .sub{ color: var(--muted); font-size: 13px; line-height: 1.35; }

    .toolbar{
      display:flex;
      gap: 10px;
      align-items:center;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .btn{
      border:1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
      color: var(--text);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      cursor:pointer;
      user-select:none;
      box-shadow: 0 6px 18px rgba(0,0,0,.25);
      display:inline-flex;
      gap:8px;
      align-items:center;
    }
    .btn:hover{ filter: brightness(1.08); }
    .btn:active{ transform: translateY(1px); }

    .toggle{
      display:flex; align-items:center; gap:8px;
      border:1px solid var(--border);
      border-radius: 999px;
      padding: 6px 10px;
      background: rgba(255,255,255,.04);
      box-shadow: 0 6px 18px rgba(0,0,0,.25);
      font-size: 13px;
      color: var(--muted);
    }
    .toggle input{ accent-color: #60a5fa; }

    .legend{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin: 12px 0 14px;
    }
    .chip{
      display:inline-flex;
      align-items:center;
      gap:8px;
      border:1px solid var(--border);
      background: rgba(255,255,255,.04);
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      color: var(--muted);
    }
    .dot{
      width:10px; height:10px; border-radius:50%;
      box-shadow: 0 0 0 2px rgba(0,0,0,.25) inset;
    }

    .board{
      border:1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      border-radius: var(--radius);
      padding: 12px;
      box-shadow: var(--shadow);
      overflow:hidden;
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(18, minmax(var(--cellMin), 1fr));
      gap: var(--gap);
      align-items:stretch;
    }

    .cell{
      position:relative;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.03);
      border-radius: 12px;
      min-height: 52px;
      padding: 6px 6px 7px;
      cursor: pointer;
      user-select:none;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      transition: transform .08s ease, filter .08s ease, border-color .08s ease;
      outline:none;
    }
    .cell:hover, .cell:focus{
      transform: translateY(-2px);
      filter: brightness(1.08);
      border-color: rgba(255,255,255,.25);
    }

    .n{ font-family: var(--mono); font-size: 11px; color: rgba(255,255,255,.75); line-height: 1; }
    .sym{ font-family: var(--mono); font-size: 16px; font-weight: 800; letter-spacing:.2px; line-height: 1.05; margin-top: 2px; }
    .name{ font-size: 11px; color: rgba(255,255,255,.82); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; line-height: 1.1; }

    .rowTitle{
      margin: 12px 0 8px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing:.2px;
      display:flex;
      gap:10px;
      align-items:center;
    }
    .rowTitle .line{ height:1px; flex:1; background: rgba(255,255,255,.08); }

    .fgrid{
      display:grid;
      grid-template-columns: repeat(15, minmax(var(--cellMin), 1fr));
      gap: var(--gap);
      align-items:stretch;
    }

    /* 分类配色 */
    .cat-alkali{ background: rgba(239,68,68,.18); }
    .cat-alkaline{ background: rgba(245,158,11,.18); }
    .cat-transition{ background: rgba(59,130,246,.18); }
    .cat-post{ background: rgba(34,197,94,.18); }
    .cat-metalloid{ background: rgba(16,185,129,.18); }
    .cat-nonmetal{ background: rgba(168,85,247,.18); }
    .cat-halogen{ background: rgba(236,72,153,.18); }
    .cat-noble{ background: rgba(14,165,233,.18); }
    .cat-lanthanide{ background: rgba(251,113,133,.18); }
    .cat-actinide{ background: rgba(244,114,182,.18); }
    .cat-unknown{ background: rgba(148,163,184,.14); }

    /* 弹窗（点击打开） */
    .modalOverlay{
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(3px);
      z-index: 2000;
      display:none;
      align-items:center;
      justify-content:center;
      padding: 14px;
    }
    .modalOverlay.show{ display:flex; }

    .modal{
      width: min(520px, 100%);
      max-height: min(78vh, 680px);
      overflow:auto;
      border: 1px solid rgba(255,255,255,.16);
      background: linear-gradient(180deg, rgba(17,24,39,.98), rgba(15,23,42,.98));
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 14px 14px 12px;
    }

    .modalHeader{
      display:flex;
      gap: 10px;
      align-items:flex-start;
      justify-content:space-between;
      margin-bottom: 10px;
    }
    .modalTitle{
      display:flex; flex-direction:column; gap:3px;
      min-width: 0;
    }
    .modalName{
      font-size: 18px;
      font-weight: 850;
      letter-spacing:.2px;
      line-height: 1.2;
      word-break: break-word;
    }
    .modalSub{
      font-size: 12px;
      color: var(--muted);
      font-family: var(--mono);
    }

    .modalActions{
      display:flex; gap:8px; align-items:center; flex-shrink:0;
    }
    .iconBtn{
      border:1px solid rgba(255,255,255,.16);
      background: rgba(255,255,255,.06);
      color: var(--text);
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 12px;
      cursor:pointer;
      user-select:none;
      white-space:nowrap;
    }
    .iconBtn:hover{ filter: brightness(1.08); }
    .iconBtn:active{ transform: translateY(1px); }

    .kv{
      display:grid;
      grid-template-columns: 120px 1fr;
      gap: 8px 10px;
      font-size: 13px;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,.10);
    }
    .k{ color: var(--muted); }
    .v{ color: rgba(255,255,255,.92); font-family: var(--mono); word-break: break-word; }

    .hint{
      color: rgba(255,255,255,.55);
      font-size: 12px;
      margin-top: 10px;
      font-family: var(--mono);
    }

    @media (max-width: 980px){ :root{ --cellMin: 42px; } }
    @media (max-width: 720px){
      :root{ --cellMin: 38px; --gap: 5px; }
      header{ flex-direction:column; align-items:stretch; }
      .toolbar{ justify-content:flex-start; }
      .kv{ grid-template-columns: 104px 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="title">
        <h1 id="pageTitle">元素周期表</h1>
        <div class="sub" id="pageSub">点击元素查看详情；支持中英文切换与英文朗读（浏览器语音）。</div>
      </div>

      <div class="toolbar">
        <label class="toggle" title="切换语言 / Toggle language">
          <input id="langToggle" type="checkbox" />
          <span id="langLabel">中文 / English</span>
        </label>

        <button class="btn" id="btnStopSpeak" title="停止朗读 / Stop speech">
          ⏹ <span id="stopSpeakText">停止朗读</span>
        </button>
      </div>
    </header>

    <div class="legend" id="legend"></div>

    <div class="board">
      <div class="grid" id="mainGrid" aria-label="Periodic Table"></div>

      <div class="rowTitle"><span id="lanTitle">镧系（57–71）</span><span class="line"></span></div>
      <div class="fgrid" id="lanGrid"></div>

      <div class="rowTitle"><span id="actTitle">锕系（89–103）</span><span class="line"></span></div>
      <div class="fgrid" id="actGrid"></div>
    </div>
  </div>

  <!-- 点击弹窗 -->
  <div class="modalOverlay" id="overlay" aria-hidden="true">
    <div class="modal" id="modal" role="dialog" aria-modal="true" aria-label="Element details">
      <div class="modalHeader">
        <div class="modalTitle">
          <div class="modalName" id="modalName">—</div>
          <div class="modalSub" id="modalSub">—</div>
        </div>
        <div class="modalActions">
          <button class="iconBtn" id="btnSpeak" title="英文发音 / Speak English">🔊 <span id="speakText">发音</span></button>
          <button class="iconBtn" id="btnClose" title="关闭 / Close">✕ <span id="closeText">关闭</span></button>
        </div>
      </div>
      <div class="kv" id="modalKV"></div>
      <div class="hint" id="modalHint">提示：点击遮罩或按 Esc 可关闭。</div>
    </div>
  </div>

  // DOM
  const mainGrid = document.getElementById("mainGrid");
  const lanGrid  = document.getElementById("lanGrid");
  const actGrid  = document.getElementById("actGrid");
  const legend   = document.getElementById("legend");

  const langToggle= document.getElementById("langToggle");
  const langLabel = document.getElementById("langLabel");
  const pageTitle = document.getElementById("pageTitle");
  const pageSub   = document.getElementById("pageSub");
  const lanTitle  = document.getElementById("lanTitle");
  const actTitle  = document.getElementById("actTitle");
  const btnStopSpeak = document.getElementById("btnStopSpeak");
  const stopSpeakText = document.getElementById("stopSpeakText");

  const overlay  = document.getElementById("overlay");
  const modal    = document.getElementById("modal");
  const modalName= document.getElementById("modalName");
  const modalSub = document.getElementById("modalSub");
  const modalKV  = document.getElementById("modalKV");
  const modalHint= document.getElementById("modalHint");
  const btnClose = document.getElementById("btnClose");
  const closeText= document.getElementById("closeText");
  const btnSpeak = document.getElementById("btnSpeak");
  const speakText= document.getElementById("speakText");

  function displayName(el){ return (state.lang==="zh") ? el.name_zh : el.name_en; }
  function categoryLabel(catKey){
    const c = categories.find(x=>x.key===catKey) || categories.find(x=>x.key==="unknown");
    return (state.lang==="zh") ? c.zh : c.en;
  }

  function renderLegend(){
    legend.innerHTML = "";
    categories.forEach(c=>{
      const chip = document.createElement("div");
      chip.className = "chip";
      const dot = document.createElement("span");
      dot.className = "dot " + catClass(c.key);
      const label = document.createElement("span");
      label.textContent = (state.lang==="zh") ? c.zh : c.en;
      chip.appendChild(dot);
      chip.appendChild(label);
      legend.appendChild(chip);
    });
  }

  function buildKV(el){
    const kv = [];
    if(state.lang==="zh"){
      kv.push(["原子序数", String(el.Z)]);
      kv.push(["元素符号", el.symbol]);
      kv.push(["中文名", el.name_zh]);
      kv.push(["英文名", el.name_en]);
      kv.push(["英文音标/读音", el.phonetic ? el.phonetic : "—"]);
      kv.push(["分类", categoryLabel(el.category)]);
      kv.push(["族 / 周期", `${el.group} / ${el.period}`]);
      kv.push(["相对原子质量", el.mass ?? "—"]);
      kv.push(["电子排布", el.econf ?? "—"]);
      kv.push(["常温物态", el.state?.zh ?? "—"]);
    }else{
      kv.push(["Atomic No.", String(el.Z)]);
      kv.push(["Symbol", el.symbol]);
      kv.push(["English", el.name_en]);
      kv.push(["Chinese", el.name_zh]);
      kv.push(["Phonetic/IPA", el.phonetic ? el.phonetic : "—"]);
      kv.push(["Category", categoryLabel(el.category)]);
      kv.push(["Group / Period", `${el.group} / ${el.period}`]);
      kv.push(["Atomic mass", el.mass ?? "—"]);
      kv.push(["Electron config.", el.econf ?? "—"]);
      kv.push(["State (STP)", el.state?.en ?? "—"]);
    }
    return kv;
  }

  function fillKV(container, el){
    container.innerHTML = "";
    buildKV(el).forEach(([k,v])=>{
      const kEl = document.createElement("div");
      kEl.className = "k";
      kEl.textContent = k;

      const vEl = document.createElement("div");
      vEl.className = "v";
      vEl.textContent = v;

      container.appendChild(kEl);
      container.appendChild(vEl);
    });
  }

  function openModal(el){
    state.currentElement = el;

    modalName.textContent = displayName(el);
    modalSub.textContent  = `#${el.Z}  ${el.symbol}  ·  ${categoryLabel(el.category)}`;
    fillKV(modalKV, el);

    overlay.classList.add("show");
    overlay.setAttribute("aria-hidden","false");

    // 把焦点给关闭按钮，键盘体验更好
    btnClose.focus({preventScroll:true});
  }

  function closeModal(){
    overlay.classList.remove("show");
    overlay.setAttribute("aria-hidden","true");
    state.currentElement = null;
  }

  btnClose.addEventListener("click", closeModal);

  // 点击遮罩关闭（但点到弹窗内容不关）
  overlay.addEventListener("mousedown", (e)=>{
    if(e.target === overlay) closeModal();
  });

  // 防止在弹窗内部点击时触发 overlay 逻辑（保险）
  modal.addEventListener("mousedown", (e)=> e.stopPropagation());

  // 表格渲染
  function createCell(el){
    const d = document.createElement("div");
    d.className = "cell " + catClass(el.category);
    d.tabIndex = 0;
    d.dataset.z = el.Z;

    if(el.Z <= 56 || (el.Z >= 72 && el.Z <= 88) || (el.Z >= 104 && el.Z <= 118)){
      d.style.gridColumn = String(el.group);
      d.style.gridRow = String(el.period);
    }

    const n = document.createElement("div");
    n.className = "n";
    n.textContent = el.Z;

    const sym = document.createElement("div");
    sym.className = "sym";
    sym.textContent = el.symbol;

    const name = document.createElement("div");
    name.className = "name";
    name.textContent = displayName(el);

    d.appendChild(n);
    d.appendChild(sym);
    d.appendChild(name);

    d.addEventListener("click", ()=> openModal(el));
    d.addEventListener("keydown", (ev)=>{
      if(ev.key === "Enter" || ev.key === " "){
        ev.preventDefault();
        openModal(el);
      }
    });

    return d;
  }

  function renderTable(){
    mainGrid.innerHTML = "";
    lanGrid.innerHTML = "";
    actGrid.innerHTML = "";

    const main = E.filter(el => (el.Z <= 56) || (el.Z >= 72 && el.Z <= 88) || (el.Z >= 104 && el.Z <= 118));
    main.forEach(el => mainGrid.appendChild(createCell(el)));

    E.filter(el => el.Z>=57 && el.Z<=71).forEach(el => lanGrid.appendChild(createCell(el)));
    E.filter(el => el.Z>=89 && el.Z<=103).forEach(el => actGrid.appendChild(createCell(el)));
  }

  // 语音朗读
  function pickEnglishVoice(){
    const voices = window.speechSynthesis?.getVoices?.() || [];
    return voices.find(v => /en-US/i.test(v.lang)) ||
           voices.find(v => /en-GB/i.test(v.lang)) ||
           voices.find(v => /^en/i.test(v.lang)) || null;
  }

  function speakEnglish(text){
    if(!("speechSynthesis" in window) || !("SpeechSynthesisUtterance" in window)){
      alert(state.lang==="zh" ? "当前浏览器不支持语音朗读。" : "Speech synthesis is not supported in this browser.");
      return;
    }
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "en-US";
    u.rate = 0.95;
    u.pitch = 1.0;
    state.preferVoice = state.preferVoice || pickEnglishVoice();
    if(state.preferVoice) u.voice = state.preferVoice;
    window.speechSynthesis.speak(u);
  }

  function stopSpeak(){
    if("speechSynthesis" in window) window.speechSynthesis.cancel();
  }

  if("speechSynthesis" in window){
    window.speechSynthesis.onvoiceschanged = ()=>{ state.preferVoice = pickEnglishVoice(); };
  }

  btnSpeak.addEventListener("click", ()=>{
    const el = state.currentElement;
    if(!el) return;
    speakEnglish(el.name_en);
  });

  btnStopSpeak.addEventListener("click", stopSpeak);

  // 语言切换
  function applyLang(){
    const zh = state.lang==="zh";
    pageTitle.textContent = zh ? "元素周期表" : "Periodic Table";
    pageSub.textContent   = zh
      ? "点击元素查看详情；支持中英文切换与英文朗读（浏览器语音）。"
      : "Click an element to view details. Supports Chinese/English toggle and English pronunciation (browser speech).";

    lanTitle.textContent  = zh ? "镧系（57–71）" : "Lanthanides (57–71)";
    actTitle.textContent  = zh ? "锕系（89–103）" : "Actinides (89–103)";

    langLabel.textContent = zh ? "中文 / English" : "English / 中文";
    speakText.textContent = zh ? "发音" : "Speak";
    stopSpeakText.textContent = zh ? "停止朗读" : "Stop speech";
    closeText.textContent = zh ? "关闭" : "Close";
    modalHint.textContent = zh ? "提示：点击遮罩或按 Esc 可关闭。" : "Tip: Click outside or press Esc to close.";

    renderLegend();
    renderTable();

    // 如果弹窗开着，切换语言时同步刷新弹窗内容
    if(overlay.classList.contains("show") && state.currentElement){
      openModal(state.currentElement);
    }
  }

  langToggle.addEventListener("change", ()=>{
    state.lang = langToggle.checked ? "en" : "zh";
    applyLang();
  });

  // Esc 关闭弹窗 + 停止朗读
  window.addEventListener("keydown", (e)=>{
    if(e.key === "Escape"){
      if(overlay.classList.contains("show")) closeModal();
      stopSpeak();
    }
  });

  // 初始化
  renderLegend();
  renderTable();
  applyLang();

})();
</script>
</body>
</html>
